<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Priya!</title>
    <!-- SEO Best Practices automatically applied -->
    <meta name="description" content="A special birthday surprise and proposal for Priya">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="page1" class="page active">
        <div class="content">
            <h1 class="glow" id="birthday-heading">Happy Birthday, Priya! ❤️</h1>
            <p class="subtitle">You light up my whole world.</p>
            <div class="cube-container">
                <div class="cube">
                    <div class="face front">🎂</div>
                    <div class="face back">💖</div>
                    <div class="face right">✨</div>
                    <div class="face left">🎉</div>
                    <div class="face top">🎁</div>
                    <div class="face bottom">🥰</div>
                </div>
            </div>
            
            <button id="nextBtn" class="btn">Next ➔</button>
        </div>
    </div>

    <!-- Proposal Page hidden initially -->
    <div id="page2" class="page hidden">
        <div class="content">
            <h1 class="glow-pink" id="proposal-heading">Will you marry me? 💍</h1>
            <div class="media-container">
                <img src="https://media.giphy.com/media/26BRv0ThflsHCqDrG/giphy.gif" alt="Cute proposal gif" class="proposal-gif">
            </div>
            <div class="btn-group">
                <button id="yesBtn" class="btn yes-btn">Yes, I will marry! 💖</button>
                <button id="noBtn" class="btn no-btn">No</button>
            </div>
        </div>
    </div>

    <!-- Success Page hidden initially -->
    <div id="page3" class="page hidden">
        <div class="content">
            <h1 class="glow" id="success-heading">YAY! I love you! ❤️❤️❤️</h1>
            <div class="media-container">
                <img src="https://media.giphy.com/media/MeIucAjPKoA120R7sN/giphy.gif" alt="Happy dance gif" class="proposal-gif">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
